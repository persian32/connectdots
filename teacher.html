<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>이음 · 교사 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F4F2EC; --card:#FCFBF7; --ink:#26251F; --ink-soft:#57544A;
    --pine:#33463F; --pine-deep:#22302B; --marigold:#BE7A12; --marigold-bg:#F3E7CD;
    --line:#DED9CB; --line-strong:#C9C3B2;
    --serif:"Gowun Batang", serif; --sans:"IBM Plex Sans KR", sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.6;}

  header{background:var(--card); border-bottom:1px solid var(--line); padding:14px 22px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .brand{font-family:var(--serif); font-weight:700; font-size:19px; color:var(--pine-deep);}
  .brand small{font-family:var(--sans); font-weight:500; font-size:12.5px; color:var(--ink-soft); margin-left:8px;}
  .spacer{flex:1;}
  .codebox{display:flex; align-items:center; gap:7px;}
  .codebox label{font-size:13px; color:var(--ink-soft);}
  input[type=text]{font-family:var(--sans); font-size:14px; color:var(--ink); background:#fff;
    border:1px solid var(--line-strong); border-radius:8px; padding:8px 11px; width:120px; outline:none;}
  input[type=text]:focus{border-color:var(--pine); box-shadow:0 0 0 3px rgba(51,70,63,.12);}
  button{font-family:var(--sans); font-weight:600; font-size:13.5px; cursor:pointer; border-radius:8px;
    padding:9px 14px; border:1px solid var(--pine); transition:background .15s, transform .1s;}
  button:active{transform:scale(.98);}
  .btn-solid{background:var(--pine); color:#F7F6F0;}
  .btn-solid:hover{background:var(--pine-deep);}
  .btn-ghost{background:transparent; color:var(--pine); border-color:var(--line-strong);}
  .btn-ghost:hover{border-color:var(--pine);}
  .btn-gold{background:var(--marigold); color:#fff; border-color:var(--marigold);}
  .btn-gold:hover{filter:brightness(.94);}
  .count{font-size:13px; color:var(--ink-soft);}

  .rosterpanel{background:#F1F3EF; border-bottom:1px solid var(--line);}
  .rp-inner{max-width:900px; margin:0 auto; padding:16px 22px;}
  .rp-head{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:10px;}
  .rp-head strong{font-size:14.5px; color:var(--pine-deep);}
  .rp-hint{font-size:12.5px; color:var(--ink-soft);}
  #rosterText{width:100%; min-height:150px; font-family:var(--sans); font-size:14px; line-height:1.7;
    border:1px solid var(--line-strong); border-radius:8px; padding:11px 13px; resize:vertical; background:#fff;}
  #rosterText:focus{border-color:var(--pine); box-shadow:0 0 0 3px rgba(51,70,63,.12); outline:none;}
  .rp-actions{display:flex; align-items:center; gap:10px; margin-top:10px;}
  .rp-status{font-size:13px; color:var(--ink-soft); flex:1;}

  main{display:grid; grid-template-columns:340px 1fr; gap:0; height:calc(100vh - 61px);}
  @media (max-width:760px){ main{grid-template-columns:1fr; height:auto;} .detail{border-left:none; border-top:1px solid var(--line);} }

  .list{border-right:1px solid var(--line); overflow-y:auto; background:var(--paper);}
  .list-head{padding:12px 18px; font-size:12px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--pine); font-weight:600; position:sticky; top:0; background:var(--paper); border-bottom:1px solid var(--line);}
  .srow{padding:12px 18px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .12s;}
  .srow:hover{background:#EEEDE6;}
  .srow.sel{background:#EAEEE9; border-left:3px solid var(--pine); padding-left:15px;}
  .srow .nm{font-weight:600; font-size:15px;}
  .srow .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .bar{height:6px; background:#E4E0D2; border-radius:4px; margin-top:8px; overflow:hidden;}
  .bar > i{display:block; height:100%; background:var(--pine); border-radius:4px;}
  .bar.full > i{background:var(--marigold);}

  .detail{overflow-y:auto; padding:26px 30px;}
  .empty{color:#9C9683; text-align:center; margin-top:16vh; font-size:14px; line-height:1.8;}
  .dname{font-family:var(--serif); font-weight:700; font-size:24px; color:var(--ink);}
  .dsub{font-size:13px; color:var(--ink-soft); margin:2px 0 18px;}

  .assembled-wrap{background:#fff; border:1px solid var(--line-strong); border-radius:10px; padding:16px 18px; margin-bottom:22px;}
  .assembled-wrap .lbl{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .assembled-wrap .lbl span{font-size:12px; font-weight:600; color:var(--pine); letter-spacing:.04em;}
  .assembled-wrap .txt{font-family:var(--serif); font-size:15px; line-height:1.85; color:var(--ink); white-space:pre-wrap;}
  .assembled-wrap .bytes{font-size:12px; color:var(--ink-soft); margin-top:10px;}
  .assembled-wrap .bytes b.over{color:#B4462F;}

  .sec{margin-bottom:16px;}
  .sec h4{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--pine);
    font-weight:600; margin:0 0 6px; border-bottom:1px solid var(--line); padding-bottom:4px;}
  .fld{margin:6px 0; font-size:14px;}
  .fld .k{color:var(--ink-soft); font-size:12.5px;}
  .fld .v{color:var(--ink); white-space:pre-wrap;}
  .fld .v.empty{color:#B4AF9E; font-style:italic;}

  .foot{padding:10px 22px; font-size:12px; color:#9C9683; border-top:1px solid var(--line); background:var(--card);}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--pine-deep);
    color:#F7F6F0; font-size:13px; padding:9px 16px; border-radius:8px; opacity:0; transition:opacity .25s; pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <span class="brand">이음<small>교사 대시보드</small></span>
  <div class="codebox">
    <label for="code">반 코드</label>
    <input type="text" id="code" placeholder="예: 2-7" autocomplete="off">
    <button class="btn-ghost" id="loadBtn">불러오기</button>
  </div>
  <span class="count" id="count"></span>
  <span class="spacer"></span>
  <button class="btn-ghost" id="rosterBtn">명단 관리</button>
  <button class="btn-gold" id="exportBtn">엑셀 내보내기</button>
</header>

<div class="rosterpanel" id="rosterPanel" style="display:none;">
  <div class="rp-inner">
    <div class="rp-head">
      <strong>명단 등록 · <span id="rpCode">반 코드 미선택</span></strong>
      <span class="rp-hint">엑셀에서 <b>번호 · 이름</b> 두 열을 복사해 붙여넣거나, 한 줄에 <b>번호 이름</b> 형식으로 입력하세요.</span>
    </div>
    <textarea id="rosterText" placeholder="1&#9;강도윤&#10;2&#9;김서준&#10;3&#9;김하은"></textarea>
    <div class="rp-actions">
      <span class="rp-status" id="rpStatus"></span>
      <button class="btn-gold" id="rosterSave">이 반 명단 저장</button>
      <button class="btn-ghost" id="rosterClose">닫기</button>
    </div>
  </div>
</div>

<main>
  <aside class="list">
    <div class="list-head">학생 (실시간)</div>
    <div id="listBody"></div>
  </aside>
  <section class="detail" id="detail">
    <div class="empty">반 코드를 입력하고 '불러오기'를 누르세요.<br>명단을 먼저 등록하려면 오른쪽 위 '명단 관리'를 누르세요.</div>
  </section>
</main>

<div class="foot">보안 규칙 적용됨 · 명단은 '명단 관리'에서 반별로 등록 · 창체 1200바이트 기준</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, collection, query, where, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBcW7NxHLPWaO1OIbDGCDBIBELnw_PmOmk",
    authDomain: "connectdot-3ef9a.firebaseapp.com",
    projectId: "connectdot-3ef9a",
    storageBucket: "connectdot-3ef9a.firebasestorage.app",
    messagingSenderId: "562643220285",
    appId: "1:562643220285:web:e99ff4c19cdc2cf19ff754"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let unsub=null, students=[], currentCode="", roster=[], selectedId=null;

  const v = (d,k)=> (d && d[k] ? String(d[k]).trim() : "");
  function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }

  function respByNumber(no){ return students.find(s=> s.number!=null && String(s.number)===String(no)); }
  function buildRows(){
    const rows=[]; const rnos=new Set();
    roster.forEach(r=>{ rnos.add(String(r.no)); rows.push({key:'r'+r.no, no:String(r.no), name:r.name, rec:respByNumber(r.no)||null, orphan:false}); });
    students.forEach(s=>{
      const no = s.number!=null ? String(s.number) : "";
      if(no && rnos.has(no)) return;                 // 명단으로 이미 표시됨
      rows.push({key:'o'+(no||s.name), no: no||'—', name:s.name, rec:s, orphan:true});
    });
    rows.sort((a,b)=>{
      if(a.orphan!==b.orphan) return a.orphan?1:-1;
      const na=parseInt(a.no,10), nb=parseInt(b.no,10);
      if(!isNaN(na)&&!isNaN(nb)) return na-nb;
      return String(a.name).localeCompare(String(b.name),'ko');
    });
    return rows;
  }

  // 나이스 EUC-KR 근사 바이트: 한글 2, 그 외 1
  function neisBytes(s){
    let n=0;
    for(const ch of (s||"")){ n += /[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(ch) ? 2 : 1; }
    return n;
  }

  function stagesDone(d){
    const has=(...ks)=>ks.some(k=>v(d,k));
    let n=0;
    if(has('bigq','career','subq','bookTitle')) n++;
    if(has('answer','quote')) n++;
    if(has('f1view','f2view','f3view','seed')) n++;
    if(has('cLink','c1','c2')) n++;
    if(has('r1','r2','r3')) n++;
    return n;
  }

  function assembleText(rec){
    const d = rec.data || {};
    const parts=[];
    const big = d.bigq || "";
    if(v(d,'career')||v(d,'subq')) parts.push('[진로 '+(v(d,'career')||'—')+'] '+(v(d,'subq')||big));
    if(v(d,'bookTitle')||v(d,'bookAuthor')) parts.push('『'+v(d,'bookTitle')+'』'+(v(d,'bookAuthor')?'('+v(d,'bookAuthor')+')':'')+'을(를) 읽고');
    if(v(d,'answer')) parts.push(v(d,'answer'));
    const mv=[]; ['f1','f2','f3'].forEach(p=>{ if(v(d,p+'field')||v(d,p+'view')) mv.push((v(d,p+'field')||'친구')+': '+v(d,p+'view')); });
    if(mv.length) parts.push('모둠 나눔에서 '+mv.join(' / ')+' 등의 관점을 접함.');
    if(v(d,'seed')) parts.push('융합 씨앗: '+v(d,'seed'));
    if(v(d,'cLink')) parts.push(v(d,'cLink'));
    const refl=[v(d,'r1'),v(d,'r2'),v(d,'r3')].filter(Boolean);
    if(refl.length) parts.push('성찰 — '+refl.join(' '));
    return parts.join(' ');
  }

  function fmtTime(ts){
    try{ const dt = ts && ts.toDate ? ts.toDate() : null; if(!dt) return ""; 
      return dt.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(e){ return ""; }
  }

  function renderList(){
    const body = document.getElementById('listBody');
    const rows = buildRows();
    const done = rows.filter(r=>r.rec && stagesDone(r.rec.data)>0).length;
    const total = roster.length || rows.length;
    document.getElementById('count').textContent = total ? (done+' / '+total+'명 참여') : '';
    if(!rows.length){ body.innerHTML = '<div style="padding:18px; color:#9C9683; font-size:13px;">명단도 저장 기록도 없습니다. 오른쪽 위 \'명단 관리\'로 명단을 먼저 등록하세요.</div>'; return; }
    body.innerHTML = rows.map(r=>{
      const n = r.rec ? stagesDone(r.rec.data) : 0;
      const pct = Math.round(n/5*100);
      const sel = r.key===selectedId ? ' sel' : '';
      const noTag = r.no!=='—' ? (r.no+'번 ') : '';
      const meta = r.rec ? ((r.rec.groupName? '모둠 '+escapeHtml(r.rec.groupName)+' · ':'') + n+'/5 단계 · '+fmtTime(r.rec.updatedAt)) : '<span style="color:#B4462F">미입력</span>';
      const orphan = r.orphan ? ' <span style="font-size:11px;color:#B4462F">(명단 외)</span>' : '';
      return '<div class="srow'+sel+'" data-key="'+escapeAttr(r.key)+'">'
        + '<div class="nm">'+escapeHtml(noTag+r.name)+orphan+'</div>'
        + '<div class="meta">'+meta+'</div>'
        + '<div class="bar'+(n===5?' full':'')+'"><i style="width:'+pct+'%"></i></div>'
        + '</div>';
    }).join('');
    body.querySelectorAll('.srow').forEach(el=>{
      el.addEventListener('click', ()=>{ selectedId = el.dataset.key; renderList(); renderDetail(); });
    });
  }

  function fld(label, value){
    const has = value && value.trim();
    return '<div class="fld"><span class="k">'+label+'</span><div class="v'+(has?'':' empty')+'">'+(has?escapeHtml(value):'—')+'</div></div>';
  }

  function renderDetail(){
    const el = document.getElementById('detail');
    const row = buildRows().find(r=>r.key===selectedId);
    if(!row){ el.innerHTML = '<div class="empty">학생을 선택하세요.</div>'; return; }
    const noTag = row.no!=='—' ? (row.no+'번 ') : '';
    if(!row.rec){
      el.innerHTML = '<div class="dname">'+escapeHtml(noTag+row.name)+'</div>'
        + '<div class="dsub">아직 저장한 내용이 없습니다. (미입력)</div>';
      return;
    }
    const rec = row.rec;
    const d = rec.data || {};
    const text = assembleText(rec);
    const bytes = neisBytes(text);
    const over = bytes > 1200;

    let mvSec = '';
    ['1','2','3'].forEach(i=>{
      if(v(d,'f'+i+'field')||v(d,'f'+i+'view')){
        mvSec += fld('친구 '+i+' ('+ (v(d,'f'+i+'name')||'') +' · '+ (v(d,'f'+i+'field')||'') +')', v(d,'f'+i+'view'));
      }
    });

    el.innerHTML =
      '<div class="dname">'+escapeHtml(noTag+rec.name)+'</div>'
      + '<div class="dsub">'+escapeHtml(rec.classCode||'')+(rec.groupName? ' · 모둠 '+escapeHtml(rec.groupName):'')+' · 마지막 저장 '+fmtTime(rec.updatedAt)+' · '+stagesDone(d)+'/5 단계</div>'

      + '<div class="assembled-wrap">'
        + '<div class="lbl"><span>글내용(통합) — 창체 스킬로 넘길 원문</span>'
        + '<button class="btn-ghost" id="copyOne" style="padding:5px 11px; font-size:12px;">복사</button></div>'
        + '<div class="txt">'+ (text ? escapeHtml(text) : '<span style="color:#B4AF9E">아직 입력이 거의 없습니다.</span>') +'</div>'
        + '<div class="bytes">약 <b class="'+(over?'over':'')+'">'+bytes+'</b> 바이트 (창체 1200 기준'+(over?' · 초과':'')+')</div>'
      + '</div>'

      + '<div class="sec"><h4>1차시 · 질문과 책</h4>'
        + fld('대질문', d.bigq) + fld('진로', d.career) + fld('진로 소질문', d.subq)
        + fld('책', (v(d,'bookTitle')? '『'+v(d,'bookTitle')+'』 '+v(d,'bookAuthor') : '')) + '</div>'

      + '<div class="sec"><h4>2차시 · 독서 정리</h4>'
        + fld('책이 준 답', d.answer) + fld('인상 깊은 대목', d.quote) + '</div>'

      + '<div class="sec"><h4>3차시 · 모둠 나눔</h4>'
        + (mvSec || '<div class="fld"><div class="v empty">—</div></div>') + '</div>'

      + '<div class="sec"><h4>4차시 · 마인드맵 융합 연결</h4>'
        + fld('내가 이은 연결점', d.cLink)
        + fld('융합 씨앗(내 아이디어)', d.seed) + '</div>'

      + '<div class="sec"><h4>6차시 · 성찰</h4>'
        + fld('① 나눔 전후 변화', d.r1) + fld('② 구체적 연결점', d.r2) + fld('③ 진로로의 회귀', d.r3) + '</div>';

    const copyBtn = document.getElementById('copyOne');
    if(copyBtn) copyBtn.addEventListener('click', ()=>{
      navigator.clipboard.writeText(text).then(()=>toast('복사됨')).catch(()=>toast('복사 실패'));
    });
  }

  async function loadClass(code){
    currentCode = code; selectedId = null;
    if(unsub){ unsub(); unsub=null; }
    document.getElementById('rpCode').textContent = code ? (code+'반') : '반 코드 미선택';
    try{
      const rs = await getDoc(doc(db,'classes',code));
      roster = (rs.exists() && Array.isArray(rs.data().roster)) ? rs.data().roster : [];
      document.getElementById('rosterText').value = roster.map(r=>r.no+'\t'+r.name).join('\n');
    }catch(e){ console.warn(e); roster=[]; }
    const ref = collection(db,'responses');
    const q = code ? query(ref, where('classCode','==',code)) : ref;
    document.getElementById('listBody').innerHTML = '<div style="padding:18px; color:#9C9683; font-size:13px;">불러오는 중…</div>';
    unsub = onSnapshot(q, snap=>{
      students = snap.docs.map(dd=>dd.data()).filter(x=>x && x.name);
      renderList();
      if(selectedId) renderDetail();
    }, err=>{
      console.warn(err);
      document.getElementById('listBody').innerHTML = '<div style="padding:18px; color:#B4462F; font-size:13px;">불러오기 실패. 콘솔을 확인하세요.</div>';
    });
  }

  function parseRoster(text){
    const out=[];
    (text||"").split(/\n/).forEach(line=>{
      const t=line.trim(); if(!t) return;
      const parts=t.split(/[\t,]+|\s+/).filter(Boolean);
      if(parts.length<2) return;
      const no=parts[0].replace(/[^0-9]/g,'');
      const name=parts.slice(1).join(' ');
      if(!no||!name) return;
      out.push({no, name});
    });
    return out;
  }
  async function saveRoster(){
    const code=document.getElementById('code').value.trim();
    const st=document.getElementById('rpStatus');
    if(!code){ st.textContent='먼저 위쪽 반 코드 칸에 반 코드를 입력하세요.'; return; }
    const list=parseRoster(document.getElementById('rosterText').value);
    if(!list.length){ st.textContent='번호와 이름을 한 줄에 하나씩 넣어 주세요.'; return; }
    st.textContent='저장 중…';
    try{
      await setDoc(doc(db,'classes',code), { classCode:code, roster:list, updatedAt: new Date().toISOString() });
      st.textContent=code+'반 명단 '+list.length+'명 저장됨.';
      roster=list; currentCode=code;
      document.getElementById('rpCode').textContent=code+'반';
      renderList();
    }catch(e){ console.warn(e); st.textContent='저장 실패: '+(e.code||e.message||''); }
  }

  function exportXlsx(){
    if(!students.length){ toast('내보낼 학생이 없습니다'); return; }
    const list=[...students].sort((a,b)=>{ const na=parseInt(a.number,10),nb=parseInt(b.number,10); if(!isNaN(na)&&!isNaN(nb))return na-nb; return String(a.name).localeCompare(String(b.name),'ko'); });
    const rows = list.map(s=>({ '이름': s.name, '글내용(통합)': assembleText(s) }));
    const ws = XLSX.utils.json_to_sheet(rows, { header:['이름','글내용(통합)'] });
    ws['!cols'] = [{wch:12},{wch:90}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '창체');
    const stamp = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, '연결_'+(currentCode||'전체')+'_'+stamp+'.xlsx');
    toast(rows.length+'명 내보냄');
  }

  function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  let toastTimer=null;
  function toast(msg){
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
  }

  document.getElementById('loadBtn').addEventListener('click', ()=> loadClass(document.getElementById('code').value.trim()));
  document.getElementById('code').addEventListener('keydown', e=>{ if(e.key==='Enter') loadClass(e.target.value.trim()); });
  document.getElementById('exportBtn').addEventListener('click', exportXlsx);
  document.getElementById('rosterBtn').addEventListener('click', ()=>{
    const p=document.getElementById('rosterPanel');
    const open = p.style.display==='none';
    p.style.display = open ? 'block' : 'none';
    const code=document.getElementById('code').value.trim();
    document.getElementById('rpCode').textContent = code ? (code+'반') : '반 코드 미선택';
  });
  document.getElementById('rosterClose').addEventListener('click', ()=>{ document.getElementById('rosterPanel').style.display='none'; });
  document.getElementById('rosterSave').addEventListener('click', saveRoster);
</script>
</body>
</html>
